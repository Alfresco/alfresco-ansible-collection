argument_specs:
  main:
    short_description: Install Alfresco Elasticsearch Batch Indexing
    description: |
      This role installs the Alfresco Elasticsearch Batch Indexing service and
      starts it. It refuses to run on ACS versions earlier than 26.2.
    options:
      search_index_version:
        type: str
        description: Version of the Batch Indexing distribution to install
      search_index_artifact_name:
        type: str
        description: Name of the Batch Indexing distribution artifact
      search_index_repository:
        type: str
        description: Base repository URL to download the Batch Indexing distribution from
      search_index_zip_url:
        type: str
        description: URL to download the Batch Indexing distribution zip file
      search_index_zip_checksum:
        type: str
        description: Checksum for the Batch Indexing distribution zip file
      search_index_download_location:
        type: str
        description: Location to download the Batch Indexing distribution zip file
      search_index_nexus_username:
        type: str
        description: Username for the Nexus repository to download the Batch Indexing artifact
      search_index_nexus_password:
        type: str
        description: Password for the Nexus repository to download the Batch Indexing artifact
      search_index_acs_version:
        type: str
        description: Version of ACS being deployed; the role fails when this is earlier than 26.2
      search_index_username:
        type: str
        description: Username for the Batch Indexing service
        required: true
      search_index_group_name:
        type: str
        description: Group name for the Batch Indexing service
        required: true
      search_index_server_port:
        type: int
        description: Port for the Batch Indexing service
        default: 8080
      search_index_elasticsearch_url:
        type: str
        description: URL for the Elasticsearch instance to index into
        required: true
      search_index_elasticsearch_username:
        type: str
        description: Username for the Elasticsearch instance
      search_index_elasticsearch_password:
        type: str
        description: Password for the Elasticsearch instance
      search_index_elasticsearch_index_name:
        type: str
        description: Name of the Elasticsearch index to write to
        default: alfresco
      search_index_db_url:
        type: str
        description: JDBC URL for the ACS repository database
        required: true
      search_index_db_username:
        type: str
        description: Username for the ACS repository database
      search_index_db_password:
        type: str
        description: Password for the ACS repository database
      search_index_acs_url:
        type: str
        description: Base URL of the ACS repository
        required: true
      search_index_content_transform_shared_secret:
        type: str
        description: Shared secret used to authenticate content transform requests to ACS
      search_index_environment:
        type: dict
        description: Additional environment variables for the Batch Indexing service
      search_index_java_home_path:
        type: str
        description: Path to the Java home directory for the Batch Indexing service
        default: /opt/java
      search_index_java_bin_path:
        type: str
        description: Path to the Java binary for the Batch Indexing service
        default: /opt/java/bin/java
      search_index_binaries_dir:
        type: str
        description: Directory where the Batch Indexing binaries will be installed
      search_index_config_dir:
        type: str
        description: Directory where the Batch Indexing configuration files will be stored
  download:
    short_description: Download the Batch Indexing distribution
    description: |
      This task downloads the Batch Indexing distribution zip file.
    options:
      search_index_zip_url:
        type: str
        description: URL to download the Batch Indexing distribution zip file
      search_index_zip_checksum:
        type: str
        description: Checksum for the Batch Indexing distribution zip file
      search_index_download_location:
        type: str
        description: Location to download the Batch Indexing distribution zip file
      search_index_artifact_name:
        type: str
        description: Name of the Batch Indexing distribution artifact
      search_index_version:
        type: str
        description: Version of the Batch Indexing distribution to download
      search_index_nexus_username:
        type: str
        description: Username for the Nexus repository to download the Batch Indexing artifact
      search_index_nexus_password:
        type: str
        description: Password for the Nexus repository to download the Batch Indexing artifact
