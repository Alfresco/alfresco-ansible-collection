---
- name: Converge
  hosts: instance
  vars:
    molecule_java_home: /opt/java
  tasks:
    - name: Include java role
      ansible.builtin.include_role:
        name: alfresco.platform.java
      vars:
        java_home: "{{ molecule_java_home }}"
    - name: Include main role
      ansible.builtin.include_role:
        name: alfresco.platform.search_index
      vars:
        search_index_nexus_username: "{{ lookup('env', 'NEXUS_USERNAME') }}"
        search_index_nexus_password: "{{ lookup('env', 'NEXUS_PASSWORD') }}"
        search_index_elasticsearch_url: http://elasticsearch-instance:9200
        search_index_db_url: jdbc:postgresql://postgres-instance:5432/alfresco
        search_index_db_password: alfresco
        search_index_java_home_path: "{{ molecule_java_home }}"
