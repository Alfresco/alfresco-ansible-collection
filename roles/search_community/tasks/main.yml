---
# tasks file for search_community
- name: Test java bin path
  ansible.builtin.stat:
    path: "{{ search_community_java_bin_path }}"
  register: stat_result

- name: Assert java bin is in the expected path
  ansible.builtin.assert:
    that:
      - "stat_result.stat.exists"
    fail_msg: "Java command not found in the expected path: {{ search_community_java_bin_path }}"
    quiet: true

- name: Download Batch Indexing
  ansible.builtin.include_tasks: download.yml

- name: Install required packages
  become: true
  ansible.builtin.package:
    name: "{{ search_community_packages }}"
    state: present

- name: Install Batch Indexing
  become: true
  block:
    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ search_community_username }}"
        group: "{{ search_community_group_name }}"
        mode: "0755"
      loop:
        - "{{ search_community_binaries_dir }}"
        - "{{ search_community_config_dir }}"

    - name: Extract distribution zip in binaries
      ansible.builtin.unarchive:
        src: "{{ search_community_download_location }}/{{ search_community_artifact_name }}-{{ search_community_version }}.zip"
        dest: "{{ search_community_binaries_dir }}"
        remote_src: true
        creates: "{{ search_community_binaries_dir }}/README.md"
        owner: "{{ search_community_username }}"
        group: "{{ search_community_group_name }}"

    - name: Install Batch Indexing service
      ansible.builtin.include_role:
        name: alfresco.platform.systemd_service
        apply:
          become: true
      vars:
        systemd_service_unit_name: "{{ search_community_systemd_service_unit_name }}"
        systemd_service_unit_description: "{{ search_community_systemd_service_unit_description }}"
        systemd_service_unit_after: "{{ search_community_systemd_service_unit_after }}"
        systemd_service_type: "{{ search_community_systemd_service_type }}"
        systemd_service_exec_start: "{{ search_community_systemd_service_exec_start }}"
        systemd_service_exec_stop: "{{ search_community_systemd_service_exec_stop }}"
        systemd_service_user: "{{ search_community_systemd_service_user }}"
        systemd_service_environment: "{{ search_community_systemd_service_environment }}"
        systemd_service_working_directory: "{{ search_community_systemd_service_working_directory }}"
        systemd_service_additional_options: "{{ search_community_systemd_service_additional_options }}"
        systemd_service_state: "{{ search_community_systemd_service_state }}"
        systemd_service_enabled: "{{ search_community_systemd_service_enabled }}"
