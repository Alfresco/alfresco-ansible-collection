ancestor: null
releases:
  0.1.0:
    changes:
      major_changes:
        - add hxi_connector service role
        - add repository-extension task list to configure alfresco extension
        - add systemd service role
    fragments:
      - hxi_connector-role.yaml
      - systemd_service.yaml
    release_date: '2025-04-29'
  0.1.0-alpha.0:
    changes:
      major_changes:
        - add java role
    fragments:
      - java_initial_release.yml
    release_date: '2025-04-10'
  0.1.1:
    changes:
      bugfixes:
        - Fix idempotency issue in hxi extension entrypoint
        - Remove unnecessary mandatory args for hxi connector
      minor_changes:
        - Allow using an existing handler to trigger the restart of the Alfresco service
          after installing the repository extension to prevent unwanted restarts.
    fragments:
      - mandatory-args.yml
      - optional-handler.yml
    release_date: '2025-05-12'
  0.2.0:
    changes:
      major_changes:
        - Add audit_storage service role
      minor_changes:
        - Use common java home argument across roles and rely on default java version
          coming from role defaults
    fragments:
      - audit_storage-role.yaml
      - common-arg-spec.yaml
    release_date: '2025-06-06'
  0.2.1:
    changes:
      minor_changes:
        - Allow usage of community.general v11
    fragments:
      - community_general.yaml
    release_date: '2025-09-01'
  0.2.2:
    changes:
      bugfixes:
        - Fix startup issue in audit storage by not overriding eventIngestion uri and
          fixing username key
    fragments:
      - audit_storage-role.yaml
    release_date: '2026-02-04'
  0.2.3:
    changes:
      bugfixes:
        - Revert ActiveMQ username key for audit storage. Add SPRING_PROFILES_ACTIVE
          variable to enable audit picking default ingestion URI.
    fragments:
      - audit_storage_user-role.yaml
    release_date: '2026-02-12'
  0.3.0:
    changes:
      minor_changes:
        - Bump Java to 17.0.18
    fragments:
      - audit_storage-role.yaml
      - hxi_connector-role.yaml
      - java-role.yaml
    release_date: '2026-02-25'
  0.4.0:
    changes:
      major_changes:
        - Add search_community service role
      security_fixes:
        - systemd_service - write the service environment (including database and other
          credentials) to a root-owned ``EnvironmentFile`` with mode ``0600`` referenced
          from the unit, instead of embedding it as ``Environment=`` lines in the world-readable
          (``0644``) unit file.
    fragments:
      - search_community-role.yaml
      - systemd_service-environment-file.yaml
    release_date: '2026-07-17'
  0.4.1:
    changes:
      minor_changes:
        - search_community - add ``search_community_transform_enabled`` to toggle the
          accepted content media types cache via the ``ALFRESCO_ACCEPTEDCONTENTMEDIATYPESCACHE_ENABLED``
          environment variable.
        - search_community - add ``search_community_transform_url`` to configure the
          Alfresco transform config endpoint, mapped to the batch indexing service's
          ``ALFRESCO_ACCEPTEDCONTENTMEDIATYPESCACHE_BASEURL`` environment variable so
          it can discover the content media types it is able to transform.
        - search_community - bump the batch indexing distribution to the released ``5.7.0``
          version (previously the ``5.7.0-A.5`` pre-release).
    fragments:
      - search_community-transform-url.yaml
    release_date: '2026-07-21'
