minor_changes:
  - search_community - add ``search_community_transform_url`` to configure the
    Alfresco transform config endpoint, mapped to the batch indexing service's
    ``ALFRESCO_ACCEPTEDCONTENTMEDIATYPESCACHE_BASEURL`` environment variable so
